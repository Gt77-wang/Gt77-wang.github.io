      </div>
      <div class="logo-text">巡检控制平台</div>
    </div>
    <div class="datetime-box">
      <div class="time-display" id="time">--:--:--</div>
      <div class="date-display" id="date">----年--月--日<br>星期-</div>
    </div>
  </div>

      <div class="mode-tab active" data-mode="free" id="modeFree">🖱️ 自由路径</div>

        <button class="route-btn" data-route="2" id="route2Btn">

  </div>
  -->
  <div class="section">
    <div class="section-title">📍 路径设置</div>
    <div style="font-size:12px;color:#49454F;margin-top:4px;font-family:'Roboto',sans-serif;font-weight:400;">
      💡 点击地图添加路径点，至少 2 个点后即可开始巡检
    </div>
  </div>

  <!-- Voice Dialog -->
  <div class="voice-dialog" id="voiceDialog">
    <div class="voice-dialog-text" id="voiceDialogText"></div>
  </div>

  <!-- Controls -->
  <div class="section">
    <div class="section-title">🎮 控制面板</div>
    <div class="action-btns">
      <button class="btn btn-start" id="btnStart" title="开始巡检">
        ▶ 开始
      </button>
      <button class="btn btn-stop" id="btnStop" title="停止巡检">
        ⏹ 停止
      </button>
      <button class="btn btn-reset" id="btnReset" title="重置路径">
        ↺ 重置
      </button>
    </div>
    <button class="btn-connect" id="btnConnect" title="点击后在地图上点击放置小车">
      🔌 连接小车
    </button>
  </div>

  <!-- Command Input -->
  <div class="section">
    <div class="section-title">⌨️ 指令输入</div>
    <div class="cmd-area">
      <input class="cmd-input" id="cmdInput" type="text"
             placeholder="输入指令或点击麦克风说话">
      <button class="cmd-btn mic" id="micBtn" title="语音输入">🎤</button>
      <button class="cmd-btn" id="cmdBtn">↵</button>
    </div>
    <div class="cmd-hint" id="cmdHint"></div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-header">
      <span>📊 巡检进度</span>
      <span id="progressPercent" style="font-weight:700;color:var(--accent);">0%</span>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar"></div>
    </div>
    <div class="progress-detail">
      <span id="progressDetail">等待开始...</span>
      <span id="progressETA"></span>
    </div>
  </div>

  <!-- Battery & Speed (compact) -->
  <div class="status-cards">
    <div class="status-card">
      <div class="status-value battery-high" id="batteryValue">🔋 100%</div>
      <div class="status-label">电量</div>
    </div>
    <div class="status-card">
      <div class="status-value speed-value" id="speedValue">0.0 m/s</div>
      <div class="status-label">速度</div>
    </div>
    <div class="status-card">
      <div class="status-value" id="checkpointValue" style="color:#6750A4;">0/0</div>
      <div class="status-label">点位</div>
    </div>
  </div>

  <!-- Environmental Sensors -->
  <div class="section">
    <div class="section-title">🌡️ 环境传感器</div>
    <div class="sensor-grid">
      <div class="sensor-item">
        <div class="sensor-icon">🌡️</div>
        <div class="sensor-info">
          <div class="sensor-value" id="sensorTemp">24.5°C</div>
          <div class="sensor-label">温度</div>
        </div>
      </div>
      <div class="sensor-item">
        <div class="sensor-icon">💧</div>
        <div class="sensor-info">
          <div class="sensor-value" id="sensorHumid">52%</div>
          <div class="sensor-label">湿度</div>
        </div>
      </div>
      <div class="sensor-item">
        <div class="sensor-icon">🛢️</div>
        <div class="sensor-info">
          <div class="sensor-value" id="sensorGas">0.3 ppm</div>
          <div class="sensor-label">可燃气</div>
        </div>
      </div>
      <div class="sensor-item">
        <div class="sensor-icon">📢</div>
        <div class="sensor-info">
          <div class="sensor-value" id="sensorNoise">48 dB</div>
          <div class="sensor-label">噪声</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== GPS COMMUNICATION ===== -->
  <!--
    ============================================================
    GPS 通信模块 — 接收小车位置 + 发送目标坐标
    ============================================================
    当前为 模拟通信 (Mock) 模式，便于比赛演示。

    接入真实小车通信需要:
    1. 通信协议: MQTT / WebSocket / HTTP（三者选一）
    2. 小车端:
       - GPS 模块 (如 ATGM336H, NEO-M8N) 获取经纬度
       - 通信模块 (如 ESP32 4G/WiFi, SIM7600) 发送/接收数据
       - 单片机固件: 读取 GPS → 编码发送 → 接收目标 → 导航执行
    3. 服务端:
       - MQTT Broker (如 Mosquitto, EMQX) 或 WebSocket Server
       - 或在 esp32 上直接运行 WebSocket Server
    4. 数据格式约定 (JSON):
       { "type":"gps", "lat":39.5456, "lng":117.3956, "ts":1714600000 }
       { "type":"target", "lat":39.5460, "lng":117.3970 }
    5. 小车唯一 ID (多车场景需要)

    替换方法: 搜索 "MOCK:" 注释，将模拟代码替换为真实通信逻辑。
    ============================================================
  -->
  <div class="gps-section">
    <div class="section-title">📡 GPS 通信</div>
    <!-- 连接状态 -->
    <div class="gps-conn-status">
      <div class="gps-conn-dot disconnected" id="gpsConnDot"></div>
      <div class="gps-conn-text" id="gpsConnText">未连接</div>
      <div class="gps-conn-count" id="gpsConnCount"></div>
    </div>
    <!-- 小车当前位置 (接收) -->
    <div class="gps-coord-display">
      <div class="gps-coord-card">
        <div class="gps-coord-val" id="gpsCarLat">--</div>
        <div class="gps-coord-label">小车纬度 (Lat)</div>
      </div>
      <div class="gps-coord-card">
        <div class="gps-coord-val" id="gpsCarLng">--</div>
        <div class="gps-coord-label">小车经度 (Lng)</div>
      </div>
    </div>
    <!-- 目标地点 (发送) -->
    <div class="section-title" style="margin-bottom:8px;">🎯 发送目标地点</div>
    <div class="gps-target-group">
      <div class="gps-target-input">
        <label>目标纬度</label>
        <input type="text" id="gpsTargetLat" placeholder="例: 39.5456">
      </div>
      <div class="gps-target-input">
        <label>目标经度</label>
        <input type="text" id="gpsTargetLng" placeholder="例: 117.3956">
      </div>
      <button class="gps-send-btn" id="gpsSendBtn">📤 发送</button>
    </div>
    <div class="gps-send-status" id="gpsSendStatus"></div>
  </div>

  <!-- Log -->
  <div class="log-section">
    <div class="section-title" style="padding:0;margin-bottom:8px;">📝 运行日志</div>
    <div class="log-box" id="logBox">
      <div class="log-line"><span class="time-stamp">[--:--:--]</span>系统就绪，等待指令...</div>
    </div>
  </div>
</aside>

<!-- ========== MAP ========== -->

  <div id="map"></div>
  <div class="map-overlay" id="mapOverlay">

    天津市宝坻区 · 京津新城珠江北环东路
  </div>
</div>
